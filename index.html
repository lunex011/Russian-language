<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Орыс Тілін Үйрену</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4a00e0,#8e2de2);
color:white;
text-align:center;
}

header{
padding:50px 20px;
}

h1{
font-size:50px;
}

.card{
background:rgba(255,255,255,0.15);
margin:20px;
padding:20px;
border-radius:20px;
}

.word{
font-size:30px;
font-weight:bold;
color:yellow;
}

button{
background:white;
color:black;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>📚 Орыс Тілін Үйрену</h1>
<p>Күн сайын жаңа сөздер жатта!</p>
</header>

<div class="card">
<h2>Бүгінгі сөз</h2>
<p class="word">Привет</p>
<p>Сәлем</p>
</div>

<div class="card">
<h2>Пайдалы сөздер</h2>
<p>Спасибо = Рахмет</p>
<p>Пожалуйста = Өтінемін</p>
<p>Да = Иә</p>
<p>Нет = Жоқ</p>
</div>

<div class="card">
<h2>Тест</h2>
<p>"Спасибо" сөзінің аудармасы?</p>
<button onclick="alert('Дұрыс! Рахмет')">
Жауапты көру
</button>
</div>

</body>
</html>
